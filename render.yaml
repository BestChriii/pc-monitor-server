services:
  - type: web
    name: pc-monitor-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        sync: false        # inserisci manualmente nel dashboard Render
      - key: CHAT_ID
        sync: false
      - key: SECRET_KEY
        sync: false
